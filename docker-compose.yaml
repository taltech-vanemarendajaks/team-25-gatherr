services:
  postgres:
    image: postgres:17
    container_name: gatherr-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: backend
      dockerfile: ./Dockerfile.dev
    container_name: gatherr-backend
    command: >
      sh -c "
      ./mvnw spring-boot:run & 
      echo 'Waiting for Spring Boot to start...' &&
      until curl -s http://127.0.0.1:8080/api/v1/v3/api-docs > /dev/null; do
        sleep 2
      done &&
      echo 'Spring Boot is UP! Generating schema...' &&
      ./mvnw springdoc-openapi:generate &&
      echo 'Schema generated successfully!' &&
      wait"
    volumes:
      - ./backend:/app
      - ~/.m2:/root/.m2
      - ./frontend:/frontend # For openapi-typescript code generation
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
