info:
  name: Get Event Summary
  type: http
  seq: 3

http:
  method: GET
  url: "{{BASE_URL}}/events/:shortId/summary"
  params:
    - name: shortId
      value: ""
      type: path

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Public endpoint — no JWT required.

  Returns:
    - `users`: each respondent's full availability in their own timezone (used for per-user filter view)
    - `slots`: one entry per slot in `event.times`, with count and list of users who are available
      at that slot after timezone normalization to `event.timezone`.

  Slots with zero responses are still included (count = 0, users = []).

  Set the `shortId` path param to the event's short ID before sending.
