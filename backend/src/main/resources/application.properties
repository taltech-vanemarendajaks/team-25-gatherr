spring.application.name=Gatherr
server.servlet.context-path=/api/v1

# Never expose stack traces or raw exception messages in HTTP error responses
server.error.include-stacktrace=never
server.error.include-message=never

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Let Liquibase build the DB. Hibernate just double-checks that the Java models match.
spring.jpa.hibernate.ddl-auto=validate
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Google Auth (used by our custom JwtConfig to verify the audience)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}

# Our Custom App Tokens
jwt.secret=${JWT_SECRET}

# CORS and Proxy settings
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}
# Enable forwarded headers for reverse proxy (nginx) to detect correct base URL
server.forward-headers-strategy=framework

# Only report Warnings and Errors, make an exception for showing INFO logs for written code
spring.main.banner-mode=off
logging.level.root=WARN
logging.level.com.gatherr=INFO