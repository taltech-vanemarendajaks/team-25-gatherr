spring.application.name=Gatherr
server.servlet.context-path=/api/v1

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Let Liquibase build the DB. Hibernate just double-checks that the Java models match.
spring.jpa.hibernate.ddl-auto=validate
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Google Auth (used by our custom JwtConfig to verify the audience)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# Our Custom App Tokens
jwt.secret=${JWT_SECRET}

# CORS and Proxy settings
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}
# Enable forwarded headers for reverse proxy (nginx) to detect correct base URL
server.forward-headers-strategy=framework
